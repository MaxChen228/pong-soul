# config/train_config.yaml

# --- 通用設定 (General Settings) ---
general:
  device: "auto"  # "auto", "cuda", "cpu" (腳本會自動檢測cuda)
  seed: null      # 設置隨機種子以便重現, null 表示不設定 (例如 42)
  obs_dim: 15
  action_dim: 1

# --- 模型儲存與載入 (Model Saving & Loading) ---
model_io:
  model_dir: "ppo_models" # 相對於 train_ppo_agent.py 的路徑
  model_name_prefix: "ppo_pong_configurable_ai" # 可以改個名字以區分
  load_existing_model: false # 建議設為 false 來測試新配置，或 true 以繼續訓練
  save_model_every_n_episodes: 200 # 每 N 個回合儲存一次模型

# --- PPO 訓練主要參數 (Main Training Loop Parameters) ---
training_loop:
  max_episodes: 10000
  max_timesteps_per_episode: 3000
  update_timesteps: 4096 # 每收集這麼多步數後更新一次網路 (這個仍然是基於步數的PPO核心機制)

ppo_agent:
  lr_actor: 0.0003
  lr_critic: 0.001
  gamma: 0.99
  k_epochs: 10
  eps_clip: 0.2
  gae_lambda: 0.95
  entropy_coefficient: 0.02 # !!! 從 0.01 (或您上次設的0.015) 增加到 0.02 或 0.025 !!!
                           # 更強地鼓勵探索。

network:
  actor_hidden_dim: 256
  critic_hidden_dim: 256
  log_std_min: -5         # !!! 可以適當提高 log_std_min，例如從 -20 到 -5 !!!
                           # 避免 std 過小到幾乎為零，即使網路想這麼做。
  log_std_max: 0.0        # !!! 將 log_std_max 從 -0.1 或 -0.2，顯著提高到 0.0 !!!
                           # (exp(0.0) = 1.0，所以 std 最大可以到 1.0)
                           # (exp(-0.1) ≈ 0.9, exp(-0.2) ≈ 0.82, exp(-0.5) ≈ 0.6)
                           # 這會給予 AI 非常大的探索潛力，動作可以覆蓋整個 [0,1] 範圍。
  init_log_std_bias: -0.5   # !!! 將初始偏置調整回 -0.5 (std 約 0.6) !!!
                           # 初始時給一個中等程度的探索，然後允許網路學習到更大的探索。
  init_log_std_weights_uniform_abs_limit: 0.001 # 這個可以保持

# --- 獎勵函數配置 (Reward Function Configuration) ---
reward_function:
  # --- 核心目標獎勵與懲罰 ---
  hit_ball_reward: 10.0            # !!! 大幅提高成功擊球的獎勵 !!!
  ai_scored_reward: 20.0           # AI 得分的獎勵設為最高
  player_scored_penalty: -10.0     # AI 被得分的懲罰

  # --- 引導性塑形獎勵/懲罰 (極簡化) ---
  # X 軸對齊 (如果沒有擊球，則懲罰與球的距離)
  enable_x_align_penalty: true
  x_align_penalty_factor: 0.2      # !!! 大幅減小X軸距離懲罰的力度 !!!
                                   # 目的是只提供非常微弱的引導，避免其主導

  # Y 軸位置與準備擊球獎勵 (暫時禁用或設得非常小，讓AI先學會X軸追球和擊球)
  enable_y_shaping: false # true
  y_paddle_effective_reach: 0.30
  y_prepared_to_hit_reward: 0.1  # !!! 設得非常小或禁用 !!!
  y_good_dist_x_for_bonus: 0.10

  # 邊緣懲罰 (可以保留，但強度也可以考慮降低)
  enable_edge_penalty: true
  edge_penalty_zone_width: 0.05
  edge_penalty_scale: 0.5        # !!! 降低邊緣懲罰強度 !!!

  # 時間懲罰 (保持非常微小或禁用)
  enable_time_penalty: true
  time_penalty_per_step: 0

# --- 日誌打印配置 (Logging Configuration) ---
logging:
  # --- 回合進程詳細日誌 (Train Loop Details) ---
  # 在每個符合條件的回合的特定時間點打印詳細的狀態、Actor輸出、獎勵等信息
  episode_progress_log:
    enable: true                             # 是否啟用此類日誌
    log_every_n_episodes: 200                 # 每 N 個回合才考慮打印其內部進程 (0 表示禁用此日誌類型)
    # 在被選中打印的回合內，每隔 N 個 timestep 打印一次詳細信息
    # 如果設為 0，則在該回合內不按 timestep 間隔打印，但可能在回合結束時打印一次（如果其他邏輯觸發）
    # 通常建議設一個大於0的值，例如與下面的 episode_summary_log 的頻率相關聯或更大
    log_at_timestep_interval: 500
    print_full_state_vector: false           # 是否打印完整的狀態向量 (否則打印簡報)
    print_reward_components: true            # 是否打印詳細的獎勵組成

  # --- PPO 更新過程詳細日誌 (PPO Update Details) ---
  ppo_update_log:
    enable: false                             # 是否啟用此類日誌
    # PPO update 是按 time_step_counter 觸發的 (每 update_timesteps)
    # log_every_n_updates > 0 表示每 N 次 PPO update 事件發生時，打印一次詳細日誌
    # 設為 0 表示不打印此日誌
    log_every_n_updates: 1 # 例如每1次update都打印，或者設為5表示每5次update打印一次
    # 在被選中打印的 PPO update 事件中，打印第 N 個 K_Epoch 的信息
    log_at_k_epoch_num: 1                    # (0=不打印, 1=打印第一個, N=打印第N個)
    print_full_state_vector_for_sample: false # 在打印 update 樣本時是否顯示完整狀態

  # --- 回合總結日誌 (Episode Summary) ---
  episode_summary_log:
    enable: true                             # 是否啟用此類日誌
    log_every_n_episodes: 20                 # 每 N 個回合打印一次總結 (0 表示不打印)
    recent_rewards_window_size: 50           # 計算平均獎勵時的回合窗口大小

visualization:
  enable_render: true                # 是否啟用訓練過程中的渲染
  render_every_n_episodes: 20       # 每 N 個回合渲染一次 (設為 0 表示不按回合渲染)
                                     # 如果啟用了渲染，至少會在第一個回合後渲染一次（如果 N > 0）
  render_whole_episode: false        # 是否渲染整個回合 (true)，或者只渲染幾幀 (false)
  render_frames_per_episode: 200     # 如果 render_whole_episode 為 false，則渲染該回合的前 N 幀
  render_fps: 60                     # 渲染時的目標 FPS
  render_screen_width: 600           # 渲染視窗寬度
  render_screen_height: 450          # 渲染視窗高度